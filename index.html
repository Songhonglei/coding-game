<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>编程小达人 - 知识闯关大冒险</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
  /* ===== 全局重置 ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* ===== 设计 Token ===== */
  :root {
    /* 主色：饱和度适中的靛蓝，不是荧光紫 */
    --c-primary:   #4361ee;
    --c-primary-lt:#eef0fd;
    /* 强调色：温暖珊瑚，非荧光粉 */
    --c-accent:    #f72585;
    --c-accent-lt: #feeef6;
    /* 功能色 */
    --c-success:   #2d9e6b;
    --c-success-lt:#eaf6f0;
    --c-warn:      #e07b00;
    --c-warn-lt:   #fef3e2;
    --c-danger:    #d62839;
    --c-danger-lt: #fdeaea;
    /* 中性色系 */
    --c-bg:        #f5f6fa;
    --c-surface:   #ffffff;
    --c-border:    #e4e6ef;
    --c-text-1:    #1a1d2e;   /* 主文字 */
    --c-text-2:    #4b4f6a;   /* 次文字 */
    --c-text-3:    #9396b0;   /* 辅助说明 */
    /* 间距 */
    --sp-xs: 4px;
    --sp-sm: 8px;
    --sp-md: 16px;
    --sp-lg: 24px;
    --sp-xl: 40px;
    /* 圆角：有层次而非全部一样 */
    --r-sm: 6px;
    --r-md: 10px;
    --r-lg: 16px;
    --r-full: 999px;
    /* 阴影：克制，只有一套 */
    --shadow-card: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.08);
    --shadow-lift: 0 2px 6px rgba(0,0,0,0.06), 0 8px 24px rgba(0,0,0,0.10);
  }

  body {
    font-family: 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
    background: var(--c-bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: var(--sp-md);
    color: var(--c-text-1);
    -webkit-font-smoothing: antialiased;
  }

  /* ===== 游戏容器 ===== */
  #game {
    width: 100%;
    max-width: 740px;
    min-height: calc(100vh - 32px);
    background: var(--c-surface);
    border-radius: var(--r-lg);
    box-shadow: var(--shadow-card);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    border: 1px solid var(--c-border);
    position: relative;
  }

  /* ===== 顶部状态栏 ===== */
  .topbar {
    display: flex;
    align-items: center;
    gap: var(--sp-sm);
    padding: 14px var(--sp-lg) 10px;
    background: var(--c-surface);
    border-bottom: 1px solid var(--c-border);
    color: var(--c-text-1);
  }
  .topbar .module-tag {
    background: var(--c-primary-lt);
    color: var(--c-primary);
    padding: 4px 12px;
    border-radius: var(--r-full);
    font-size: 0.82rem;
    font-weight: 600;
    white-space: nowrap;
    letter-spacing: 0.02em;
  }
  .topbar .score-box {
    margin-left: auto;
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--c-text-2);
    background: var(--c-bg);
    padding: 4px 14px;
    border-radius: var(--r-full);
    border: 1px solid var(--c-border);
    margin-right: 46px;
  }
  .progress-track {
    height: 3px;
    background: var(--c-border);
    margin: 0;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    width: 0%;
    background: var(--c-primary);
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* ===== 内容区域 ===== */
  .content {
    flex: 1;
    padding: var(--sp-lg) var(--sp-lg) var(--sp-xl);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }

  /* ===== 页面切换动画 ===== */
  .page {
    animation: pageIn 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  }
  @keyframes pageIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ===== 开始页 ===== */
  .start-page {
    text-align: center;
    padding: var(--sp-xl) var(--sp-lg);
  }
  .start-page .big-title {
    font-size: 2rem;
    font-weight: 700;
    color: var(--c-text-1);
    letter-spacing: -0.02em;
    margin-bottom: var(--sp-sm);
    line-height: 1.2;
  }
  .start-page .sub-title {
    font-size: 1rem;
    color: var(--c-text-2);
    margin-bottom: var(--sp-xl);
    line-height: 1.7;
    font-weight: 400;
  }
  .emoji-row {
    font-size: 2.2rem;
    letter-spacing: 10px;
    margin-bottom: var(--sp-lg);
    display: block;
    animation: bounceRow 3s ease-in-out infinite;
  }
  .logo-wrap {
    margin-bottom: var(--sp-md);
  }
  .logo-wrap svg {
    filter: drop-shadow(0 2px 8px rgba(67,97,238,0.25));
  }
  @keyframes bounceRow {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  .module-list {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 10px;
    margin: 0 auto var(--sp-xl);
    max-width: 560px;
  }
  .module-card {
    background: var(--c-bg);
    border-radius: var(--r-md);
    padding: 14px 10px;
    text-align: center;
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--c-text-2);
    border: 1px solid var(--c-border);
    transition: box-shadow 0.2s, transform 0.2s, border-color 0.2s;
    cursor: default;
  }
  .module-card:hover {
    box-shadow: var(--shadow-card);
    transform: translateY(-3px);
    border-color: var(--c-primary);
    color: var(--c-primary);
  }
  .module-card .mc-emoji { font-size: 1.6rem; display: block; margin-bottom: 6px; }

  /* ===== 通用按钮 ===== */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    border: none;
    border-radius: var(--r-md);
    padding: 12px 32px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    color: #fff;
    background: var(--c-primary);
    box-shadow: 0 1px 2px rgba(67,97,238,0.2), 0 2px 8px rgba(67,97,238,0.18);
    transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
    font-family: inherit;
    letter-spacing: 0.01em;
  }
  .btn:hover {
    background: #3451d1;
    box-shadow: 0 2px 4px rgba(67,97,238,0.2), 0 4px 16px rgba(67,97,238,0.22);
    transform: translateY(-1px);
  }
  .btn:active { transform: translateY(0); box-shadow: none; }
  .btn.green {
    background: var(--c-success);
    box-shadow: 0 1px 2px rgba(45,158,107,0.2), 0 2px 8px rgba(45,158,107,0.18);
  }
  .btn.green:hover {
    background: #228a5a;
    box-shadow: 0 2px 4px rgba(45,158,107,0.2), 0 4px 16px rgba(45,158,107,0.22);
  }

  /* ===== 模块介绍页 ===== */
  .intro-page {
    text-align: center;
    padding: var(--sp-md) 0;
  }
  .intro-emoji {
    font-size: 2.8rem;
    margin-bottom: var(--sp-sm);
    display: inline-block;
    animation: introPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes introPop {
    from { transform: scale(0.4); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }
  .intro-title {
    font-size: 1.45rem;
    font-weight: 700;
    margin-bottom: var(--sp-sm);
    letter-spacing: -0.01em;
    color: var(--c-text-1);
  }
  .intro-desc {
    font-size: 0.97rem;
    color: var(--c-text-2);
    margin-bottom: var(--sp-sm);
    max-width: 480px;
    margin-left: auto;
    margin-right: auto;
    line-height: 1.7;
    font-weight: 400;
  }

  /* 动画展示区 */
  .anim-stage {
    width: 100%;
    height: 220px;
    background: var(--c-bg);
    border-radius: var(--r-md);
    margin: var(--sp-md) auto var(--sp-lg);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    border: 1px solid var(--c-border);
  }

  /* --- 动画1：变量盒子 --- */
  .var-box {
    width: 110px;
    height: 110px;
    background: var(--c-primary-lt);
    border-radius: var(--r-md);
    border: 2px solid var(--c-primary);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--c-primary);
    font-weight: 600;
    position: relative;
    box-shadow: var(--shadow-card);
  }
  .var-box .label { font-size: 0.75rem; opacity: 0.7; margin-bottom: 4px; letter-spacing: 0.03em; }
  .var-box .value { font-size: 1.8rem; font-weight: 700; transition: all 0.3s; }
  .var-box .value.changing { animation: valueSwap 0.4s ease; }
  @keyframes valueSwap {
    0%  { transform: scale(1); opacity: 1; }
    40% { transform: scale(0.4) rotate(90deg); opacity: 0; }
    60% { transform: scale(0.4) rotate(-90deg); opacity: 0; }
    100%{ transform: scale(1); opacity: 1; }
  }
  .var-arrow {
    position: absolute;
    font-size: 1.5rem;
    animation: arrowDown 1.8s ease-in-out infinite;
  }
  @keyframes arrowDown {
    0%, 100% { transform: translateY(-8px); opacity: 0.25; }
    50%       { transform: translateY(8px);  opacity: 0.9; }
  }

  /* --- 动画2：条件分叉路口 --- */
  .cond-scene { position: relative; width: 300px; height: 200px; }
  .cond-ask {
    position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    background: var(--c-primary); color: #fff;
    padding: 5px 16px; border-radius: var(--r-full);
    font-weight: 600; font-size: 0.82rem; white-space: nowrap;
    letter-spacing: 0.02em;
  }
  .cond-path {
    position: absolute; top: 34px; width: 2px; height: 50px;
    background: var(--c-border); left: 50%; transform: translateX(-50%);
  }
  .cond-left, .cond-right {
    position: absolute; top: 82px; font-size: 0.78rem; font-weight: 600; text-align: center;
  }
  .cond-left { left: 28px; color: var(--c-success); }
  .cond-right { right: 28px; color: var(--c-warn); }
  .cond-left::before, .cond-right::before {
    content: ''; position: absolute; top: -46px; width: 100px; height: 50px;
    border-top: 2px solid; border-radius: 50% 50% 0 0 / 100% 100% 0 0;
  }
  .cond-left::before  { border-color: var(--c-success); right: -50px; border-left: none; }
  .cond-right::before { border-color: var(--c-warn);    left: -50px; border-right: none; }
  .cond-walker {
    position: absolute; top: 86px; left: 50%; font-size: 1.5rem;
    animation: condWalk 3s ease infinite;
  }
  @keyframes condWalk {
    0%   { left: 50%; top: 86px; }
    30%  { left: 50%; top: 100px; }
    50%  { left: 20%; top: 130px; }
    70%  { left: 20%; top: 130px; opacity: 1; }
    100% { left: 20%; top: 130px; opacity: 0; }
  }
  .cond-walker2 {
    position: absolute; top: 86px; left: 50%; font-size: 1.5rem;
    animation: condWalk2 3s ease infinite;
    animation-delay: 1.5s; opacity: 0;
  }
  @keyframes condWalk2 {
    0%   { left: 50%; top: 86px; opacity: 0; }
    5%   { opacity: 1; }
    30%  { left: 50%; top: 100px; opacity: 1; }
    50%  { left: 80%; top: 130px; opacity: 1; }
    70%  { left: 80%; top: 130px; opacity: 1; }
    100% { left: 80%; top: 130px; opacity: 0; }
  }

  /* --- 动画3：循环 --- */
  .loop-scene { position: relative; width: 200px; height: 200px; }
  .loop-circle {
    width: 130px; height: 130px;
    border: 4px solid var(--c-warn); border-radius: 50%; border-top-color: transparent;
    position: absolute; top: 35px; left: 35px;
    animation: loopSpin 1.4s linear infinite;
  }
  @keyframes loopSpin { to { transform: rotate(360deg); } }
  .loop-dot {
    position: absolute; width: 14px; height: 14px;
    background: var(--c-warn); border-radius: 50%; top: 26px; left: 93px;
    animation: loopDot 1.4s linear infinite;
  }
  @keyframes loopDot {
    0%   { transform: rotate(0deg)   translateX(-65px) rotate(0deg); }
    100% { transform: rotate(360deg) translateX(-65px) rotate(-360deg); }
  }
  .loop-center {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    font-size: 1.8rem;
  }
  .loop-count {
    position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
    font-size: 0.75rem; font-weight: 500; color: var(--c-text-3); white-space: nowrap;
  }

  /* --- 动画4：函数工厂 --- */
  .func-scene { display: flex; align-items: center; gap: 10px; }
  .func-in, .func-out {
    width: 52px; height: 52px; border-radius: var(--r-md);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem; font-weight: 700; color: #fff;
  }
  .func-in  { background: var(--c-success); }
  .func-out { background: var(--c-accent); }
  .func-machine {
    width: 90px; height: 80px;
    background: #fff; border: 2px solid var(--c-border);
    border-radius: var(--r-md); position: relative;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.6rem; box-shadow: var(--shadow-card);
  }
  .func-machine::after {
    content: '函数'; position: absolute; bottom: -20px;
    font-size: 0.7rem; font-weight: 600; color: var(--c-text-3); letter-spacing: 0.05em;
  }
  .func-arrow-mini {
    font-size: 1.1rem; color: var(--c-text-3);
    animation: arrowFlow 1.2s ease-in-out infinite;
  }
  @keyframes arrowFlow {
    0%, 100% { transform: translateX(-3px); opacity: 0.4; }
    50%       { transform: translateX(3px);  opacity: 1; }
  }
  .func-in-move  { animation: inMove  2s ease infinite; }
  @keyframes inMove {
    0%  { transform: translateX(0);   opacity: 1; }
    40% { transform: translateX(28px); opacity: 0.4; }
    50% { transform: translateX(28px); opacity: 0; }
    51% { transform: translateX(0);   opacity: 0; }
    100%{ transform: translateX(0);   opacity: 1; }
  }
  .func-out-move { animation: outMove 2s ease infinite; }
  @keyframes outMove {
    0%, 50% { transform: translateX(0);    opacity: 0; }
    51%     { transform: translateX(-28px); opacity: 0.4; }
    100%    { transform: translateX(0);    opacity: 1; }
  }

  /* --- 动画5：调试 --- */
  .bug-scene { position: relative; width: 280px; height: 200px; }
  .bug-bug {
    position: absolute; top: 50%; left: 10%; font-size: 2rem;
    animation: bugCrawl 3s ease infinite;
  }
  @keyframes bugCrawl {
    0%   { left: 10%; transform: rotate(0); }
    45%  { left: 45%; transform: rotate(0); }
    50%  { left: 45%; transform: scale(1.1); }
    55%  { left: 45%; transform: scale(0) rotate(720deg); opacity: 1; }
    60%  { left: 45%; transform: scale(0); opacity: 0; }
    100% { left: 45%; transform: scale(0); opacity: 0; }
  }
  .bug-magnifier {
    position: absolute; top: 40%; left: 60%; font-size: 2rem;
    animation: magSearch 3s ease infinite;
  }
  @keyframes magSearch {
    0%, 40% { left: 60%; transform: rotate(-15deg); }
    45%  { left: 48%; transform: rotate(0) scale(1.2); }
    60%  { left: 48%; transform: rotate(0) scale(1); opacity: 1; }
    100% { left: 48%; transform: rotate(0) scale(1); opacity: 1; }
  }
  .bug-zap {
    position: absolute; top: 35%; left: 42%; font-size: 1.8rem;
    opacity: 0; animation: bugZap 3s ease infinite;
  }
  @keyframes bugZap {
    0%, 52% { opacity: 0; transform: scale(0); }
    55%  { opacity: 1; transform: scale(1.4); }
    62%  { opacity: 0; transform: scale(0.5); }
    100% { opacity: 0; }
  }
  .bug-fixed {
    position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
    font-size: 0.82rem; font-weight: 600; color: var(--c-success);
    opacity: 0; animation: bugFixed 3s ease infinite; white-space: nowrap;
  }
  @keyframes bugFixed {
    0%, 62% { opacity: 0; }
    70%  { opacity: 1; }
    100% { opacity: 1; }
  }

  /* ===== 题目页 ===== */
  .question-page { display: flex; flex-direction: column; }
  .q-number {
    display: inline-block;
    background: var(--c-bg);
    color: var(--c-text-3);
    font-weight: 500;
    font-size: 0.78rem;
    padding: 3px 12px;
    border-radius: var(--r-full);
    margin-bottom: var(--sp-md);
    align-self: flex-start;
    border: 1px solid var(--c-border);
    letter-spacing: 0.04em;
  }
  .q-concept {
    font-size: 0.9rem;
    color: var(--c-text-2);
    margin-bottom: var(--sp-md);
    line-height: 1.7;
    background: var(--c-bg);
    padding: var(--sp-sm) var(--sp-md);
    border-radius: var(--r-sm);
    border-left: 3px solid var(--c-primary);
    font-weight: 400;
  }
  .q-text {
    font-size: 1.1rem;
    font-weight: 600;
    line-height: 1.65;
    margin-bottom: var(--sp-md);
    color: var(--c-text-1);
    letter-spacing: -0.01em;
  }
  /* 代码块 */
  .code-block {
    background: #1e1e2e;
    border-radius: var(--r-md);
    padding: 16px 20px;
    margin-bottom: var(--sp-md);
    overflow-x: auto;
  }
  .code-block pre {
    font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', Consolas, monospace;
    font-size: 0.92rem;
    line-height: 1.75;
    color: #cdd6f4;
    white-space: pre;
  }
  .code-block .kw  { color: #cba6f7; }
  .code-block .num { color: #fab387; }
  .code-block .str { color: #a6e3a1; }
  .code-block .fn  { color: #89b4fa; }
  .code-block .cmt { color: #6c7086; font-style: italic; }

  /* 选项 */
  .options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: var(--sp-md);
  }
  .option {
    background: var(--c-surface);
    border: 1.5px solid var(--c-border);
    border-radius: var(--r-md);
    padding: 14px 16px;
    font-size: 0.95rem;
    font-weight: 500;
    cursor: pointer;
    text-align: left;
    transition: border-color 0.18s, background 0.18s, box-shadow 0.18s;
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: inherit;
    color: var(--c-text-1);
    line-height: 1.5;
  }
  .option .opt-letter {
    width: 28px; height: 28px; border-radius: var(--r-sm);
    background: var(--c-bg); color: var(--c-text-2);
    display: flex; align-items: center; justify-content: center;
    font-weight: 600; font-size: 0.82rem; flex-shrink: 0;
    border: 1px solid var(--c-border);
    transition: background 0.18s, color 0.18s, border-color 0.18s;
    letter-spacing: 0.02em;
  }
  .option:hover:not(.disabled) {
    border-color: var(--mc, var(--c-primary));
    background: var(--c-primary-lt);
  }
  .option:hover:not(.disabled) .opt-letter {
    background: var(--mc, var(--c-primary));
    color: #fff;
    border-color: var(--mc, var(--c-primary));
  }
  .option.correct {
    border-color: var(--c-success);
    background: var(--c-success-lt);
    animation: correctPulse 0.4s ease;
  }
  .option.correct .opt-letter {
    background: var(--c-success); color: #fff; border-color: var(--c-success);
  }
  .option.wrong {
    border-color: var(--c-danger);
    background: var(--c-danger-lt);
    animation: wrongShake 0.35s ease;
  }
  .option.wrong .opt-letter {
    background: var(--c-danger); color: #fff; border-color: var(--c-danger);
  }
  .option.disabled { cursor: default; }
  .option.disabled:not(.correct):not(.wrong) { opacity: 0.45; }
  @keyframes correctPulse {
    0%   { transform: scale(1); }
    45%  { transform: scale(1.025); }
    100% { transform: scale(1); }
  }
  @keyframes wrongShake {
    0%, 100% { transform: translateX(0); }
    25%  { transform: translateX(-7px); }
    75%  { transform: translateX(7px); }
  }

  /* 反馈区 */
  .feedback {
    border-radius: var(--r-md);
    padding: 14px 18px;
    margin-bottom: var(--sp-md);
    animation: fbIn 0.35s ease;
    display: none;
  }
  .feedback.show { display: block; }
  @keyframes fbIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .feedback.right {
    background: var(--c-success-lt);
    border: 1px solid #b7e4cf;
  }
  .feedback.wrong-fb {
    background: var(--c-danger-lt);
    border: 1px solid #f0b8bc;
  }
  .feedback .fb-title {
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: 6px;

/* ---- 进度暂存（localStorage）---- */
var SAVE_KEY = 'coding-game-save';
function saveProgress() {
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify({
      qIndex: state.qIndex,
      moduleIndex: state.moduleIndex,
      score: state.score,
      moduleScore: state.moduleScore,
      ts: Date.now()
    }));
  } catch(e) {}
}
function loadProgress() {
  try {
    var raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch(e) { return null; }
}
function clearProgress() {
  try { localStorage.removeItem(SAVE_KEY); } catch(e) {}
}

/* ---- 朗读功能（Web Speech API）---- */
var tts = {
  utter: null,
  speaking: false,
  paused: false,

  speak: function(text, onEnd) {
    this.stop();
    var clean = text.replace(/<[^>]+>/g, '').replace(/&[a-z]+;/g, '');
    this.utter = new SpeechSynthesisUtterance(clean);
    this.utter.lang = 'zh-CN';
    this.utter.rate = 0.88;
    this.utter.pitch = 1.0;
    this.utter.onend = function() {
      tts.speaking = false;
      tts.paused = false;
      tts.updateBtn();
      if (onEnd) onEnd();
    };
    this.utter.onerror = function() {
      tts.speaking = false;
      tts.paused = false;
      tts.updateBtn();
    };
    speechSynthesis.speak(this.utter);
    this.speaking = true;
    this.paused = false;
    this.updateBtn();
  },

  stop: function() {
    if (speechSynthesis.speaking || speechSynthesis.pending) {
      speechSynthesis.cancel();
    }
    this.speaking = false;
    this.paused = false;
    this.updateBtn();
  },

  toggle: function(text) {
    if (this.speaking && !this.paused) {
      speechSynthesis.pause();
      this.paused = true;
      this.updateBtn();
      return 'paused';
    } else if (this.paused) {
      speechSynthesis.resume();
      this.paused = false;
      this.updateBtn();
      return 'resumed';
    } else {
      this.speak(text);
      return 'speaking';
    }
  },

  updateBtn: function() {
    var btns = document.querySelectorAll('.speak-btn, .fb-speak-btn');
    btns.forEach(function(btn) {
      if (tts.speaking && !tts.paused) {
        btn.classList.add('speaking');
      } else if (tts.paused) {
        btn.classList.add('speaking');
      } else {
        btn.classList.remove('speaking');
      }
    });
  }
};


/* ---- 朗读控制 ---- */
function toggleSpeak() {
  var btn = document.getElementById('speakBtn');
  if (!btn) return;
  if (window.tts.speaking && !window.tts.paused) {
    window.tts.toggle();
  } else {
    var q = QUESTIONS[state.qIndex];
    var text = q.concept.replace(/<[^>]+>/g,'').replace(/&[a-z]+;/g,'') + '。' + q.question;
    window.tts.speak(text);
  }
}

function continueGame() {
  var save = loadProgress();
  if (!save || save.qIndex >= QUESTIONS.length) { startGame(); return; }
  state.qIndex = save.qIndex;
  state.moduleIndex = save.moduleIndex;
  state.score = save.score;
  state.moduleScore = save.moduleScore || [0,0,0,0,0];
  state.answered = false;
  renderQuestion();
}

/* 颜色加深 */
function shade(hex) {
  var r = parseInt(hex.slice(1,3),16);
  var g = parseInt(hex.slice(3,5),16);
  var b = parseInt(hex.slice(5,7),16);
  r = Math.max(0, r-40);
  g = Math.max(0, g-40);
  b = Math.max(0, b-40);
  return 'rgb('+r+','+g+','+b+')';
}

function renderQuestion() {
  state.phase = 'question';
  state.answered = false;
  var q = QUESTIONS[state.qIndex];
  var m = MODULES[state.moduleIndex];
  moduleTag.textContent = m.emoji + ' ' + m.name;
  scoreBox.textContent = state.score + ' 分';
  updateProgress();

  var codeHTML = q.code
    ? '<div class="code-block" style="border-left-color:'+m.color+';"><pre>'+q.code+'</pre></div>'
    : '';

  var optionsHTML = q.options.map(function(opt, i){
    return '<button class="option" data-index="'+i+'" onclick="selectOption('+i+')" style="--mc:'+m.color+';">' +
      '<span class="opt-letter">'+opt.letter+'</span>' +
      '<span>'+opt.text+'</span>' +
    '</button>';
  }).join('');

  // 生成图文插图
  var visualHTML = q.visual ? getQuestionVisual(q.visual, q.module) : getDefaultVisual(q.module, m);

  content.innerHTML =
    '<div class="page question-page">' +
      '<span class="q-number" style="color:'+m.color+';">第 '+(state.qIndex+1)+' 题 / 共'+QUESTIONS.length+'题</span>' +
      '<div class="q-concept" style="border-left-color:'+m.color+';">'+q.concept+'</div>' +
      visualHTML +
      '<div class="q-text">'+q.question+'</div>' +
      codeHTML +
      '<div class="options">'+optionsHTML+'</div>' +
      '<div class="feedback" id="feedback"></div>' +
      '<div class="next-btn-wrap" id="nextWrap">' +
        '<button class="btn '+(state.qIndex >= QUESTIONS.length-1 ? 'green' : '')+'" onclick="goNext()">'+
          (state.qIndex >= QUESTIONS.length-1 ? '查看成绩' : '下一题')+
        '</button>' +
      '</div>' +
    '</div>';
  saveProgress();

  // 更新朗读按钮
  var speakText = q.concept.replace(/<[^>]+>/g,'').replace(/&[a-z]+;/g,'') + '。' + q.question;
  window._currentSpeakText = speakText;
}

/* 选择选项 */
function selectOption(index) {
  if (state.answered) return;
  state.answered = true;
  var q = QUESTIONS[state.qIndex];
  var m = MODULES[state.moduleIndex];
  var opts = document.querySelectorAll('.option');
  opts.forEach(function(o){ o.classList.add('disabled'); });

  var feedback = document.getElementById('feedback');
  var nextWrap = document.getElementById('nextWrap');
  var correctIdx = q.answer;
  var isRight = (index === correctIdx);

  // 标记正确和错误
  opts[correctIdx].classList.add('correct');
  if (!isRight) {
    opts[index].classList.add('wrong');
  }

  // 停止朗读
  if (window.tts) window.tts.stop();

  if (isRight) {
    state.score++;
    state.moduleScore[state.moduleIndex]++;
    scoreBox.textContent = state.score + ' 分';
    feedback.className = 'feedback right show';
    feedback.innerHTML =
      '<div class="fb-title">答对了</div>' +
      '<div class="fb-body"><strong>知识点小结：</strong>'+q.explain+'</div>' +
      '<button class="fb-speak-btn" onclick="tts.speak(''+q.explain.replace(/'/g,'\\\'').replace(/<[^>]+>/g,'').replace(/&[a-z]+;/g,'')+'')">🔊 朗读解析</button>';
  } else {
    feedback.className = 'feedback wrong-fb show';
    var correctText = q.options[correctIdx].text;
    feedback.innerHTML =
      '<div class="fb-title">答错了，没关系</div>' +
      '<div class="fb-body">正确答案是 <span class="answer-tag">'+q.options[correctIdx].letter+'</span>'+
      '  '+correctText+'<br><br><strong>解析：</strong>'+q.explain+'</div>' +
      '<button class="fb-speak-btn" onclick="tts.speak(''+q.explain.replace(/'/g,'\\\'').replace(/<[^>]+>/g,'').replace(/&[a-z]+;/g,'')+'')">🔊 朗读解析</button>';
  }

  nextWrap.classList.add('show');
}

/* 进入下一题/下一模块/总结 */
function goNext() {
  // 停止朗读
  if (window.tts) window.tts.stop();
  state.qIndex++;
  // 判断是否进入新模块
  if (state.qIndex < QUESTIONS.length) {
    var nextModuleIdx = QUESTIONS[state.qIndex].module - 1;
    if (nextModuleIdx !== state.moduleIndex) {
      state.moduleIndex = nextModuleIdx;
      renderIntro();
    } else {
      renderQuestion();
    }
  } else {
    renderSummary();
  }
}

/* 更新进度条 */
function updateProgress() {
  var pct = (state.qIndex / QUESTIONS.length) * 100;
  progressFill.style.width = pct + '%';
}

/* ============================================================
 *  渲染：总结页
 * ============================================================ */
function renderSummary() {
  state.phase = 'summary';
  clearProgress();
  topbar.style.display = 'flex';
  progressTrack.style.display = 'block';
  progressFill.style.width = '100%';
  moduleTag.textContent = '闯关完成';
  scoreBox.textContent = state.score + ' 分';

  var total = QUESTIONS.length;
  var stars = '';
  var ratio = state.score / total;
  var starCount = ratio >= 0.9 ? 5 : (ratio >= 0.7 ? 4 : (ratio >= 0.5 ? 3 : (ratio >= 0.3 ? 2 : 1)));
  for (var i=0;i<5;i++){ stars += i < starCount ? '⭐' : '☆'; }

  // 模块掌握情况
  var resultsHTML = MODULES.map(function(m, i){
    var ms = state.moduleScore[i];
    var pct = (ms / 3) * 100;
    var barColor = ms === 3 ? m.color : (ms === 2 ? '#e07b00' : '#d62839');
    var level = ms === 3 ? '精通' : (ms === 2 ? '良好' : '加油');
    return '<div class="mr-item">' +
      '<span class="mr-emoji">'+m.emoji+'</span>' +
      '<div class="mr-info">' +
        '<div class="mr-name">'+m.name+'</div>' +
        '<div class="mr-bar"><div class="mr-bar-fill" data-target="'+pct+'" style="width:0%;background:'+barColor+';"></div></div>' +
      '</div>' +
      '<span class="mr-stat" style="color:'+barColor+';">'+ms+'/3</span>' +
    '</div>';
  }).join('');

  // 鼓励语
  var encourage = '';
  if (ratio >= 0.9) {
    encourage = '非常扎实！你对这5个编程核心概念都掌握得很好。变量、条件、循环、函数、调试——这是真正编程的基础。继续学下去，实际写代码会让你理解得更深。';
  } else if (ratio >= 0.7) {
    encourage = '理解得不错，大部分概念已经清晰了。建议回去再看看错题的解析，特别是概念和代码之间的对应关系。知道"是什么"只是第一步，动手写才能真正掌握。';
  } else if (ratio >= 0.5) {
    encourage = '有些概念还不太清楚，这很正常——编程概念第一次接触都比较抽象。建议把错题的解析多读几遍，从生活中找到对应的例子，帮助理解。';
  } else {
    encourage = '这些概念比较新，需要时间消化。不用着急，把每道题的解析认真读一遍，理解比记忆更重要。准备好了再来闯一次，会有很大提升。';
  }

  content.innerHTML =
    '<div class="page summary-page">' +
      '<div class="summary-crown">🎓</div>' +
      '<h2 class="summary-title">闯关完成</h2>' +
      '<div class="summary-score">'+state.score+'<small> / '+total+'</small></div>' +
      '<div class="summary-stars">'+stars+'</div>' +
      '<div class="module-results">'+resultsHTML+'</div>' +
      '<div class="summary-encourage">'+encourage+'</div>' +
      '<button class="btn green" onclick="restart()">再来一次</button>' +
    '</div>';

  // 动画填充进度条
  setTimeout(function(){
    document.querySelectorAll('.mr-bar-fill').forEach(function(el){
      el.style.width = el.getAttribute('data-target') + '%';
    });
  }, 150);
}

/* ---- 题目图文插图 ---- */
function getDefaultVisual(module, m) {
  // 无 visual 字段时，使用模块默认插图
  switch(module) {
    case 1: return getVarVisual({ varName:'x', values:['8','3.14','"hello"'] }, m);
    case 2: return getCondVisual({ cond:'score > 60', takePath:'left' }, m);
    case 3: return getLoopVisual({ count:5 }, m);
    case 4: return getFuncVisual({ input:'原料', output:'成品' }, m);
    case 5: return getBugVisual({}, m);
    default: return '';
  }
}

function getQuestionVisual(visual, module) {
  var m = MODULES[module-1];
  switch(visual.type || '') {
    case 'variable': return getVarVisual(visual.params || {}, m);
    case 'condition': return getCondVisual(visual.params || {}, m);
    case 'loop': return getLoopVisual(visual.params || {}, m);
    case 'function': return getFuncVisual(visual.params || {}, m);
    case 'bug': return getBugVisual(visual.params || {}, m);
    default: return getDefaultVisual(module, m);
  }
}

/* --- 变量：盒子 --- */
function getVarVisual(p, m) {
  var vn = p.varName || 'x';
  var v  = (p.values && p.values[0]) || '8';
  var c  = m ? m.color : '#4361ee';
  var bg = m ? m.color.replace('#', '').replace(/../g, function(h) { return String.fromCharCode(parseInt(h,16)+40) }) : '#eef0fd';
  return '<div class="q-visual">' +

function startGame() {
  clearProgress();
  state.qIndex = 0;
  state.moduleIndex = 0;
  state.score = 0;
  state.moduleScore = [0,0,0,0,0];
  renderIntro();
}

function startQuestions() {
  renderQuestion();
}

function restart() {
  clearProgress();
  state = {
    phase: 'start',
    qIndex: 0,
    moduleIndex: 0,
    score: 0,
    moduleScore: [0,0,0,0,0],
    answered: false
  };
  renderStart();
}

/* ============================================================
 *  变量动画：循环变化值
 * ============================================================ */
var varAnimTimer = null;
function startVarAnim() {
  var values = ['"hello"', '42', 'True', '"你好"', '3.14'];
  var idx = 0;
  var el = document.getElementById('varValue');
  if (!el) return;
  if (varAnimTimer) clearInterval(varAnimTimer);
  varAnimTimer = setInterval(function(){
    var e = document.getElementById('varValue');
    if (!e) { clearInterval(varAnimTimer); return; }
    idx = (idx + 1) % values.length;
    e.classList.add('changing');
    setTimeout(function(){
      e.textContent = values[idx];
      e.classList.remove('changing');
    }, 200);
  }, 1800);
}

/* 重写 renderIntro 以触发变量动画 */
var _origRenderIntro = renderIntro;
renderIntro = function() {
  _origRenderIntro();
  var m = MODULES[state.moduleIndex];
  if (m.anim === 'variable') {
    setTimeout(startVarAnim, 100);
  }
};

/* ============================================================
 *  主题切换
 * ============================================================ */
var isDark = false;
function toggleTheme() {
  isDark = !isDark;
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  document.getElementById('iconMoon').style.display = isDark ? 'none' : 'block';
  document.getElementById('iconSun').style.display  = isDark ? 'block' : 'none';
}

/* ============================================================
 *  初始化
 * ============================================================ */
renderStart();
  window.tts = tts;
